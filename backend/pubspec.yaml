name: medet_mobile
description: "Application mobile de détection et classification d'anomalies digestives (polypes, MICI, mauvaise préparation)."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Gestion d'état simple
  provider: ^6.1.2

  # Capture / upload d'image (caméra ou galerie)
  image_picker: ^1.1.2

  # Appel HTTP vers le backend (étage 2, cloud) — utilisé plus tard
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Modèle YOLO TFLite à ajouter ici une fois converti (étage 1, local)
  # assets:
  #   - assets/models/yolo_polype.tflite
