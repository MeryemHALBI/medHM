<script>
const bundleData = [{"id": "architecture/hybrid_pipeline", "path": "architecture/hybrid_pipeline.md", "type": "process", "title": "Architecture hybride — pipeline en deux étages", "description": "Pipeline de détection combinant un modèle YOLO léger embarqué localement et un modèle de classification plus lourd appelé à la demande sur le cloud.", "tags": ["architecture", "pipeline", "yolo", "efficientnet"], "body": "# Architecture hybride\n\n## Contexte\n\nLes modèles de classification comparés (voir\n[EfficientNet](../models/efficientnet.md),\n[Swin Transformer](../models/swin_transformer.md), etc.) atteignent une\nbonne précision mais sont trop lourds pour tourner en continu sur un\nappareil mobile. L'architecture hybride répond à ce problème en séparant\nla détection rapide de la classification précise.\n\n## Fonctionnement\n\n1. **Étage 1 — local (mobile)** : le modèle [YOLO](../models/yolo_polype.md)\n   (nano ou small) analyse l'image directement sur l'appareil. Il répond à\n   une question binaire : une anomalie est-elle présente ou non ?\n2. **Filtre de décision** :\n   - Si aucune anomalie n'est détectée → résultat final `normal`, sans\n     appel réseau.\n   - Si une anomalie est détectée → l'image est envoyée à l'étage 2.\n3. **Étage 2 — cloud (à la demande)** : un modèle de classification\n   (actuellement [EfficientNet](../models/efficientnet.md)) reçoit\n   l'image via le [backend FastAPI](../components/backend_api.md) et\n   renvoie la classe précise parmi les 4 catégories.\n\n## Classes détectées\n\n- `normal`\n- `polype`\n- `mici`\n- `mauvaise_preparation`\n\n## Évolution future envisagée\n\nUne implémentation hybride Swin/YOLO à flux continu a été évoquée : une\npartie du traitement s'effectuerait en continu sur l'application mobile,\nles résultats intermédiaires (features compressées) seraient ensuite\nenvoyés au backbone cloud pour poursuivre l'inférence. Cette approche est\nplus complexe et a été mise de côté en faveur de l'implémentation simple\ndécrite ci-dessus, qui sert de première étape.\n\n## Implémentations associées\n\n- [POC Streamlit](../components/poc_streamlit.md) — démonstration du\n  pipeline complet pour l'équipe métier.\n- [Backend FastAPI](../components/backend_api.md) — expose l'étage 2.\n- [Application mobile Flutter](../components/mobile_app.md) — implémente\n  l'étage 1 et appelle l'étage 2 si nécessaire.", "links": ["components/backend_api", "components/mobile_app", "components/poc_streamlit", "models/efficientnet", "models/swin_transformer", "models/yolo_polype"]}, {"id": "components/backend_api", "path": "components/backend_api.md", "type": "process", "title": "Backend FastAPI", "description": "API REST exposant le modèle EfficientNet (étage 2) pour la classification d'images jugées suspectes par l'étage 1.", "tags": ["backend", "api", "fastapi", "etage-2"], "body": "# Backend FastAPI\n\n## Objectif\n\nExposer le modèle [EfficientNet](../models/efficientnet.md) (étage 2 de\nl'[architecture hybride](../architecture/hybrid_pipeline.md)) via une\nAPI REST, appelée par l'[application mobile](mobile_app.md) uniquement\nlorsque l'étage 1 détecte une anomalie suspecte.\n\n## Endpoints\n\n- `GET /health` — vérifie que le serveur tourne et que le modèle est\n  chargé.\n- `POST /predict` — reçoit une image, renvoie la classe prédite, la\n  confiance, et le détail des probabilités pour les 4 classes.\n\n## Emplacement\n\n`backend/main.py`, `backend/requirements.txt`, poids attendus dans\n`backend/weights/efficientnet_etage2.pt`.\n\n## Statut\n\nTesté en local avec succès (`uvicorn main:app`), réponses validées sur\n`/health` et `/predict`. Pas encore déployé en ligne — accessible\nuniquement depuis la machine de développement (`localhost:8000`).\n\n## Prochaine étape\n\nDéploiement sur un service cloud accessible publiquement, pour que\nl'[application mobile](mobile_app.md) puisse l'appeler en dehors du\nréseau local de développement.", "links": ["architecture/hybrid_pipeline", "components/mobile_app", "models/efficientnet"]}, {"id": "components/mobile_app", "path": "components/mobile_app.md", "type": "process", "title": "Application mobile Flutter", "description": "Application mobile implémentant l'étage 1 (YOLO local) et l'appel à l'étage 2 (backend cloud) en cas de détection.", "tags": ["mobile", "flutter", "etage-1"], "body": "# Application mobile Flutter\n\n## Objectif\n\nImplémenter l'[architecture hybride](../architecture/hybrid_pipeline.md)\ncôté utilisateur final : capture ou import d'image, détection locale via\n[YOLO](../models/yolo_polype.md), puis appel conditionnel au\n[backend FastAPI](backend_api.md) si une anomalie est détectée.\n\n## Écrans\n\n- Accueil — prendre une photo ou importer une image (caméra/galerie).\n- Analyse — affichage du déroulé du pipeline en cours.\n- Résultat — classe finale et niveau de confiance.\n\n## Statut actuel\n\nStructure de base posée (`lib/models`, `lib/services`, `lib/screens`).\nPipeline d'analyse actuellement **simulé** (mock) — l'appel réel au\nmodèle YOLO embarqué (TensorFlow Lite) et l'appel HTTP au backend ne\nsont pas encore branchés ; les points d'intégration sont identifiés par\ndes commentaires `TODO` dans `pipeline_service.dart`.\n\nPremiers tests sur émulateur Android en cours.\n\n## Prochaines étapes\n\n1. Convertir le modèle [YOLO](../models/yolo_polype.md) entraîné\n   (`.pt`) au format `.tflite` pour l'intégration mobile.\n2. Brancher l'appel réel au [backend FastAPI](backend_api.md) (code\n   d'exemple déjà présent en commentaire dans le service de pipeline).\n3. Tester sur appareil physique.", "links": ["architecture/hybrid_pipeline", "components/backend_api", "models/yolo_polype"]}, {"id": "components/poc_streamlit", "path": "components/poc_streamlit.md", "type": "process", "title": "POC Streamlit", "description": "Interface de démonstration du pipeline hybride complet, destinée aux tests avec l'équipe métier avant présentation à l'équipe médicale.", "tags": ["poc", "streamlit", "demo"], "body": "# POC Streamlit\n\n## Objectif\n\nDémontrer visuellement le fonctionnement de l'\n[architecture hybride](../architecture/hybrid_pipeline.md) : upload\nd'une image, passage par l'étage 1 ([YOLO](../models/yolo_polype.md)),\npuis si nécessaire par l'étage 2\n([EfficientNet](../models/efficientnet.md)), avec affichage du résultat\nfinal et du chemin de décision suivi.\n\n## Emplacement\n\n`poc/app.py` dans le repository (dossier `poc/`).\n\n## Mode démo\n\nSi les poids des modèles ne sont pas trouvés, l'application bascule\nautomatiquement en mode démo (prédictions simulées), avec un avertissement\nvisuel explicite, pour permettre une présentation même sans modèle\nentraîné disponible.\n\n## Statut\n\nValidé par le manager. Approuvé pour être maintenu dans le dossier\n`poc/` du repository.\n\n## Évolutions proposées\n\nLe manager a proposé de donner à l'équipe médicale la possibilité,\nvia une interface à construire :\n\n- d'enrichir le [dataset](../data/deep_polypes.md) ;\n- d'évaluer les résultats d'inférence (validation/correction des\n  prédictions), en vue d'un futur cycle de reinforcement learning.\n\nCes deux fonctionnalités ne sont pas encore implémentées.", "links": ["architecture/hybrid_pipeline", "data/deep_polypes", "models/efficientnet", "models/yolo_polype"]}, {"id": "data/deep_polypes", "path": "data/deep_polypes.md", "type": "table", "title": "Dataset deep_polypes", "description": "Jeu de données d'images endoscopiques/coloscopiques organisé en 4 dossiers de classe, utilisé pour entraîner les modèles de classification.", "tags": ["dataset", "classification"], "body": "# Dataset deep_polypes\n\n## Structure\n\n```\ndeep_polypes/deep_polypes/\n├── normal/\n├── polype/\n├── mici/\n└── mauvaise_preparation/\n```\n\nFormat : classification par dossier (chaque image classée par son\ndossier parent, sans annotation de localisation/bounding box).\n\n## Volumétrie\n\n580 images au total, réparties entre les 4 classes.\n\n## Utilisation\n\n- Entraînement et comparaison des modèles de classification : voir\n  [EfficientNet](../models/efficientnet.md),\n  [Swin Transformer](../models/swin_transformer.md),\n  [ResNet50](../models/resnet50.md),\n  [ConvNeXt](../models/convnext.md), [ViT](../models/vit.md).\n- Source des images utilisées pour entraîner et tester le modèle\n  [YOLO](../models/yolo_polype.md) (après pré-annotation, voir\n  ci-dessous).\n\n## Limite connue\n\nCe dataset ne contient que des labels de classe par image, pas de\nbounding box. Pour entraîner YOLO (qui nécessite la localisation de\nl'anomalie), les images de la classe `polype` ont été pré-annotées\nautomatiquement à l'aide d'un modèle YOLO entraîné sur\n[Kvasir-SEG](kvasir_seg.md), puis vérifiées visuellement.\n\n## Prochaine étape proposée\n\nLe manager a proposé de donner à l'équipe médicale la possibilité\nd'enrichir ce dataset (ajout de nouvelles images) afin de relancer\nl'entraînement avec une base plus riche.", "links": ["data/kvasir_seg", "models/convnext", "models/efficientnet", "models/resnet50", "models/swin_transformer", "models/vit", "models/yolo_polype"]}, {"id": "data/kvasir_seg", "path": "data/kvasir_seg.md", "type": "table", "title": "Dataset Kvasir-SEG", "description": "Dataset public de polypes coloscopiques avec bounding boxes, utilisé pour pré-entraîner le modèle YOLO et pré-annoter le dataset deep_polypes.", "tags": ["dataset", "detection", "yolo", "public"], "body": "# Dataset Kvasir-SEG\n\n## Description\n\nDataset public contenant 1000 images de polypes coloscopiques, avec\nleurs bounding boxes stockées dans un fichier JSON\n(`kavsir_bboxes.json`).\n\n## Rôle dans le projet\n\n- Sert à entraîner un premier modèle [YOLO](../models/yolo_polype.md)\n  capable de détecter la classe `polype` avec localisation.\n- Ce modèle entraîné sur Kvasir-SEG est ensuite utilisé pour\n  pré-annoter automatiquement les images `polype` du dataset\n  [deep_polypes](deep_polypes.md), qui n'avait initialement que des\n  labels de classe sans bounding box.\n\n## Limite connue\n\nKvasir-SEG ne couvre que la classe `polype`. Les classes `mici` et\n`mauvaise_preparation` n'ont pas d'équivalent public en bounding boxes\net nécessiteraient une annotation manuelle si elles devaient être\nintégrées à l'étage YOLO dans une phase future.", "links": ["data/deep_polypes", "models/yolo_polype"]}, {"id": "index", "path": "index.md", "type": "index", "title": "medet — Détection et classification d'anomalies digestives", "description": "Bundle de connaissances du projet medet, couvrant les modèles entraînés, l'architecture hybride, le dataset, et les composants (POC, backend, application mobile).", "tags": [], "body": "# medet — Bundle de connaissances\n\nCe bundle documente le projet **medet** : détection et classification\nd'anomalies radiologiques du tube digestif (polypes, MICI, mauvaise\npréparation) par computer vision et transfer learning.\n\n## Sommaire\n\n- [Architecture hybride](architecture/hybrid_pipeline.md) — vue d'ensemble\n  du pipeline en deux étages (YOLO local + modèle cloud).\n- [Dataset](data/deep_polypes.md) — description du jeu de données utilisé\n  pour l'entraînement.\n- Modèles entraînés :\n  - [EfficientNet](models/efficientnet.md)\n  - [Swin Transformer](models/swin_transformer.md)\n  - [ResNet50](models/resnet50.md)\n  - [ConvNeXt](models/convnext.md)\n  - [ViT](models/vit.md)\n  - [YOLO (étage 1)](models/yolo_polype.md)\n- Composants :\n  - [POC Streamlit](components/poc_streamlit.md)\n  - [Backend FastAPI](components/backend_api.md)\n  - [Application mobile Flutter](components/mobile_app.md)\n\nVoir [log.md](log.md) pour l'historique des évolutions de ce bundle.", "links": ["architecture/hybrid_pipeline", "components/backend_api", "components/mobile_app", "components/poc_streamlit", "data/deep_polypes", "log", "models/convnext", "models/efficientnet", "models/resnet50", "models/swin_transformer", "models/vit", "models/yolo_polype"]}, {"id": "log", "path": "log.md", "type": "log", "title": "Historique des mises à jour — bundle medet", "description": "", "tags": [], "body": "# Historique\n\n## 2026-06-29\n\n- Création initiale du bundle OKF.\n- Documentation des 5 modèles de classification comparés (EfficientNet,\n  Swin Transformer, ResNet50, ConvNeXt, ViT).\n- Documentation du modèle YOLO (étage 1, détection polype/normal).\n- Documentation de l'architecture hybride en deux étages.\n- Documentation du dataset deep_polypes et de Kvasir-SEG (utilisé pour\n  pré-annoter les bounding boxes YOLO).\n- Documentation des trois composants : POC Streamlit, backend FastAPI,\n  application mobile Flutter (structure initiale, pipeline simulé).", "links": []}, {"id": "models/convnext", "path": "models/convnext.md", "type": "metric", "title": "ConvNeXt — classification d'anomalies digestives", "description": "Modèle ConvNeXt entraîné sur le dataset deep_polypes pour la classification en 4 classes.", "tags": ["model", "classification", "transfer-learning"], "body": "# ConvNeXt\n\n## Description\n\nModèle ConvNeXt entraîné par transfer learning sur le\n[dataset deep_polypes](../data/deep_polypes.md).\n\n## Résultats mesurés (jeu de test)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9770 |\n| Précision (macro) | 0.9689 |\n| Rappel (macro) | 0.9760 |\n| F1 (macro) | 0.9716 |\n| Temps moyen | 15.34 ms/image |\n\n## Remarque\n\nMeilleure accuracy mesurée à égalité avec [ViT](vit.md) sur ce jeu de\ntest, avec un temps d'exécution comparable à\n[ResNet50](resnet50.md).", "links": ["data/deep_polypes", "models/resnet50", "models/vit"]}, {"id": "models/efficientnet", "path": "models/efficientnet.md", "type": "metric", "title": "EfficientNet — classification d'anomalies digestives", "description": "Modèle de transfer learning (EfficientNet-B0) entraîné sur le dataset deep_polypes pour la classification en 4 classes.", "tags": ["model", "classification", "transfer-learning", "etage-2"], "body": "# EfficientNet\n\n## Description\n\nModèle EfficientNet-B0 pré-entraîné sur ImageNet, dont la tête de\nclassification a été remplacée pour s'adapter aux 4 classes du\n[dataset deep_polypes](../data/deep_polypes.md).\n\n## Résultats mesurés (jeu de test)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9655 |\n| Précision (macro) | 0.9580 |\n| Rappel (macro) | 0.9699 |\n| F1 (macro) | 0.9626 |\n| Temps moyen | 14.64 ms/image |\n\n## Rôle dans l'architecture\n\nModèle retenu pour l'**étage 2** (cloud) de l'\n[architecture hybride](../architecture/hybrid_pipeline.md), en raison de\nson bon compromis précision/poids comparé aux modèles plus lourds\n(Swin Transformer notamment). Exposé via le\n[backend FastAPI](../components/backend_api.md).", "links": ["architecture/hybrid_pipeline", "components/backend_api", "data/deep_polypes"]}, {"id": "models/resnet50", "path": "models/resnet50.md", "type": "metric", "title": "ResNet50 — classification d'anomalies digestives", "description": "Modèle ResNet50 entraîné sur le dataset deep_polypes pour la classification en 4 classes.", "tags": ["model", "classification", "transfer-learning"], "body": "# ResNet50\n\n## Description\n\nModèle ResNet50 entraîné par transfer learning sur le\n[dataset deep_polypes](../data/deep_polypes.md).\n\n## Résultats mesurés (jeu de test)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9540 |\n| Précision (macro) | 0.9386 |\n| Rappel (macro) | 0.9491 |\n| F1 (macro) | 0.9432 |\n| Temps moyen | 15.23 ms/image |\n\n## Remarque\n\nModèle de référence classique, performances légèrement inférieures aux\n4 autres modèles comparés sur ce dataset.", "links": ["data/deep_polypes"]}, {"id": "models/swin_transformer", "path": "models/swin_transformer.md", "type": "metric", "title": "Swin Transformer — classification d'anomalies digestives", "description": "Modèle Swin Transformer entraîné sur le dataset deep_polypes pour la classification en 4 classes.", "tags": ["model", "classification", "transfer-learning", "transformer"], "body": "# Swin Transformer\n\n## Description\n\nModèle Swin Transformer entraîné par transfer learning sur le\n[dataset deep_polypes](../data/deep_polypes.md).\n\n## Résultats mesurés (jeu de test)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9655 |\n| Précision (macro) | 0.9568 |\n| Rappel (macro) | 0.9522 |\n| F1 (macro) | 0.9514 |\n| Temps moyen | 12.39 ms/image |\n\n## Remarque\n\nBien que ce modèle ait obtenu de bons scores lors de la comparaison\ninitiale, il est jugé trop lourd pour un déploiement serveur classique\ncomparé à [EfficientNet](efficientnet.md), qui offre un meilleur\ncompromis précision/poids. Non retenu pour l'étage 2 de l'\n[architecture hybride](../architecture/hybrid_pipeline.md) actuelle.", "links": ["architecture/hybrid_pipeline", "data/deep_polypes", "models/efficientnet"]}, {"id": "models/vit", "path": "models/vit.md", "type": "metric", "title": "ViT — classification d'anomalies digestives", "description": "Vision Transformer entraîné sur le dataset deep_polypes pour la classification en 4 classes.", "tags": ["model", "classification", "transfer-learning", "transformer"], "body": "# ViT (Vision Transformer)\n\n## Description\n\nVision Transformer entraîné par transfer learning sur le\n[dataset deep_polypes](../data/deep_polypes.md).\n\n## Résultats mesurés (jeu de test)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9770 |\n| Précision (macro) | 0.9714 |\n| Rappel (macro) | 0.9731 |\n| F1 (macro) | 0.9713 |\n| Temps moyen | 20.33 ms/image |\n\n## Remarque\n\nMeilleure accuracy mesurée à égalité avec [ConvNeXt](convnext.md), mais\ntemps d'exécution le plus élevé des 5 modèles comparés.", "links": ["data/deep_polypes", "models/convnext"]}, {"id": "models/yolo_polype", "path": "models/yolo_polype.md", "type": "metric", "title": "YOLO — détection de polypes (étage 1)", "description": "Modèle YOLO nano/small entraîné pour la détection de présence de polype, conçu pour tourner localement sur l'application mobile.", "tags": ["model", "detection", "yolo", "etage-1", "embarque"], "body": "# YOLO — étage 1\n\n## Description\n\nModèle YOLO nano (`yolo11n`) entraîné en deux temps :\n\n1. Entraînement initial sur [Kvasir-SEG](../data/kvasir_seg.md) (bounding\n   boxes de polypes déjà disponibles).\n2. Utilisation de ce modèle pour pré-annoter automatiquement les images\n   `polype` du [dataset deep_polypes](../data/deep_polypes.md), suivi\n   d'une vérification visuelle et d'un ré-entraînement sur ce nouveau\n   jeu de données filtré.\n\n## Décision de scope\n\nSur demande du manager, ce modèle a été limité à une tâche binaire :\ndétecter si un polype est présent ou non (classes `polype` vs `normal`),\nplutôt que les 4 classes complètes. Les classes `mici` et\n`mauvaise_preparation` ne sont pas couvertes par YOLO à ce stade.\n\n## Résultats mesurés (run initial, modèle Kvasir-SEG appliqué tel quel)\n\n| Métrique | Valeur |\n|---|---|\n| Accuracy | 0.9342 |\n| Précision | 1.0000 |\n| Rappel | 0.7826 |\n\nMatrice de confusion : 53 vrais normaux, 0 fausse alerte, 5 polypes\nratés, 18 vrais polypes détectés.\n\n## Point d'attention\n\nLe rappel (0.78) est jugé plus critique que la précision en contexte\nmédical : un polype raté (faux négatif) est plus coûteux qu'une fausse\nalerte vérifiée par un médecin. Piste d'amélioration identifiée :\nabaisser le seuil de confiance de détection (`conf`), au prix d'un\nnombre plus élevé de fausses alertes.\n\n## Rôle dans l'architecture\n\nConstitue l'**étage 1** de l'[architecture hybride](../architecture/hybrid_pipeline.md),\nintégré dans l'[application mobile Flutter](../components/mobile_app.md).", "links": ["architecture/hybrid_pipeline", "components/mobile_app", "data/deep_polypes", "data/kvasir_seg"]}];
const typeColors = {"index": "#888780", "log": "#888780", "metric": "#1baf7a", "process": "#2a78d6", "table": "#eda100", "default": "#9085e9"};

const nodes = bundleData.map(c => ({
  data: { id: c.id, label: c.title, type: c.type }
}));

const edges = [];
bundleData.forEach(c => {
  c.links.forEach(target => {
    if (bundleData.some(b => b.id === target)) {
      edges.push({ data: { source: c.id, target: target } });
    }
  });
});

const cy = cytoscape({
  container: document.getElementById('graph'),
  elements: [...nodes, ...edges],
  style: [
    {
      selector: 'node',
      style: {
        'background-color': ele => typeColors[ele.data('type')] || typeColors['default'],
        'label': 'data(label)',
        'font-size': '11px',
        'width': 28,
        'height': 28,
        'text-valign': 'bottom',
        'text-margin-y': 6,
        'color': '#333'
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': '#bbb',
        'target-arrow-color': '#bbb',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier'
      }
    }
  ],
  layout: { name: 'cose', animate: false, padding: 40 }
});

cy.on('tap', 'node', function(evt) {
  const id = evt.target.id();
  const concept = bundleData.find(c => c.id === id);
  if (!concept) return;

  const tagsHtml = (concept.tags || []).map(t => `<span class="tag">${t}</span>`).join(' ');

  document.getElementById('panel').innerHTML = `
    <h2>${concept.title}</h2>
    <div class="meta">
      <strong>type:</strong> ${concept.type} &nbsp;|&nbsp; <strong>id:</strong> ${concept.id}
    </div>
    <p>${concept.description}</p>
    <div>${tagsHtml}</div>
    <hr>
    <div>${marked.parse(concept.body)}</div>
  `;
});
</script>
